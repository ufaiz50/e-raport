basePath: /api/v1
definitions:
  models.Book:
    properties:
      author:
        type: string
      created_at:
        type: string
      id:
        type: integer
      school:
        $ref: '#/definitions/models.School'
      school_id:
        type: integer
      student:
        $ref: '#/definitions/models.Student'
      student_id:
        type: integer
      title:
        type: string
      updated_at:
        type: string
    type: object
  models.Class:
    properties:
      academic_year:
        type: string
      created_at:
        type: string
      homeroom:
        type: string
      id:
        type: integer
      level:
        type: string
      name:
        type: string
      school:
        $ref: '#/definitions/models.School'
      school_id:
        type: integer
      updated_at:
        type: string
    type: object
  models.CreateBook:
    properties:
      author:
        type: string
      school_id:
        type: integer
      student_id:
        type: integer
      title:
        type: string
    required:
    - author
    - title
    type: object
  models.CreateGrade:
    properties:
      academic_year:
        type: string
      book_id:
        type: integer
      knowledge_score:
        maximum: 100
        minimum: 0
        type: number
      notes:
        type: string
      school_id:
        type: integer
      semester:
        maximum: 2
        minimum: 1
        type: integer
      skill_score:
        maximum: 100
        minimum: 0
        type: number
      student_id:
        type: integer
    required:
    - academic_year
    - book_id
    - knowledge_score
    - semester
    - skill_score
    - student_id
    type: object
  models.CreateStudent:
    properties:
      class_id:
        type: integer
      email:
        type: string
      name:
        type: string
      school_id:
        type: integer
      type:
        enum:
        - junior
        - senior
        example: junior
        type: string
    required:
    - email
    - name
    - type
    type: object
  models.Grade:
    properties:
      academic_year:
        type: string
      book:
        $ref: '#/definitions/models.Book'
      book_id:
        type: integer
      created_at:
        type: string
      final_score:
        type: number
      id:
        type: integer
      knowledge_score:
        type: number
      notes:
        type: string
      school:
        $ref: '#/definitions/models.School'
      school_id:
        type: integer
      semester:
        type: integer
      skill_score:
        type: number
      student:
        $ref: '#/definitions/models.Student'
      student_id:
        type: integer
      updated_at:
        type: string
    type: object
  models.LoginUser:
    properties:
      password:
        type: string
      school_id:
        type: integer
      username:
        type: string
    required:
    - password
    - username
    type: object
  models.School:
    properties:
      address:
        type: string
      code:
        type: string
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      updated_at:
        type: string
    type: object
  models.Student:
    properties:
      class:
        $ref: '#/definitions/models.Class'
      class_id:
        type: integer
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      school:
        $ref: '#/definitions/models.School'
      school_id:
        type: integer
      type:
        enum:
        - junior
        - senior
        example: junior
        type: string
      updated_at:
        type: string
    type: object
  models.UpdateBook:
    properties:
      author:
        type: string
      school_id:
        type: integer
      student_id:
        type: integer
      title:
        type: string
    type: object
  models.UpdateGrade:
    properties:
      knowledge_score:
        maximum: 100
        minimum: 0
        type: number
      notes:
        type: string
      school_id:
        type: integer
      skill_score:
        maximum: 100
        minimum: 0
        type: number
    type: object
  models.UpdateStudent:
    properties:
      class_id:
        type: integer
      email:
        type: string
      name:
        type: string
      school_id:
        type: integer
      type:
        enum:
        - junior
        - senior
        example: senior
        type: string
    type: object
externalDocs:
  description: OpenAPI
  url: https://swagger.io/resources/open-api/
host: localhost:8001
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is a sample server celler server.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: E-Raport API
  version: "1.0"
paths:
  /:
    get:
      consumes:
      - application/json
      description: do ping
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: string
      summary: ping example
      tags:
      - example
  /books:
    get:
      description: Get a list of all books with optional pagination
      parameters:
      - default: 0
        description: Offset for pagination
        in: query
        name: offset
        type: integer
      - default: 10
        description: Limit for pagination
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved list of books
          schema:
            items:
              $ref: '#/definitions/models.Book'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Get all books with pagination
      tags:
      - books
    post:
      consumes:
      - application/json
      description: Create a new book with the given input data
      parameters:
      - description: Create book object
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.CreateBook'
      produces:
      - application/json
      responses:
        "201":
          description: Successfully created book
          schema:
            $ref: '#/definitions/models.Book'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      - JwtAuth: []
      summary: Create a new book
      tags:
      - books
  /books/{id}:
    delete:
      description: Delete the book with the given ID
      parameters:
      - description: Book ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Successfully deleted book
          schema:
            type: string
        "404":
          description: book not found
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Delete a book by ID
      tags:
      - books
    get:
      description: Get details of a book by its ID
      parameters:
      - description: Book ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved book
          schema:
            $ref: '#/definitions/models.Book'
        "404":
          description: Book not found
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Find a book by ID
      tags:
      - books
    put:
      consumes:
      - application/json
      description: Update the book details for the given ID
      parameters:
      - description: Book ID
        in: path
        name: id
        required: true
        type: string
      - description: Update book object
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.UpdateBook'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully updated book
          schema:
            $ref: '#/definitions/models.Book'
        "400":
          description: Bad Request
          schema:
            type: string
        "404":
          description: book not found
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Update a book by ID
      tags:
      - books
  /classes:
    get:
      description: Get a list of all classes with optional pagination
      parameters:
      - default: 0
        description: Offset for pagination
        in: query
        name: offset
        type: integer
      - default: 10
        description: Limit for pagination
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved list of classes
          schema:
            items:
              $ref: '#/definitions/models.Class'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Get all classes with pagination
      tags:
      - classes
  /grades:
    get:
      description: 'Get grade list with optional filters: student_id, semester, academic_year'
      parameters:
      - default: 0
        description: Offset for pagination
        in: query
        name: offset
        type: integer
      - default: 10
        description: Limit for pagination
        in: query
        name: limit
        type: integer
      - description: Student ID
        in: query
        name: student_id
        type: integer
      - description: Semester
        in: query
        name: semester
        type: integer
      - description: Academic year
        in: query
        name: academic_year
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved list of grades
          schema:
            items:
              $ref: '#/definitions/models.Grade'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Get grades
      tags:
      - grades
    post:
      consumes:
      - application/json
      description: Create grade for a student and subject(book)
      parameters:
      - description: Create grade object
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.CreateGrade'
      produces:
      - application/json
      responses:
        "201":
          description: Successfully created grade
          schema:
            $ref: '#/definitions/models.Grade'
        "400":
          description: Bad Request
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      - JwtAuth: []
      summary: Create a grade
      tags:
      - grades
  /grades/{id}:
    delete:
      parameters:
      - description: Grade ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Successfully deleted grade
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Delete grade by ID
      tags:
      - grades
    put:
      consumes:
      - application/json
      parameters:
      - description: Grade ID
        in: path
        name: id
        required: true
        type: string
      - description: Update grade object
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.UpdateGrade'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully updated grade
          schema:
            $ref: '#/definitions/models.Grade'
      security:
      - ApiKeyAuth: []
      summary: Update grade by ID
      tags:
      - grades
  /login:
    post:
      consumes:
      - application/json
      description: Authenticates a user using username and password, returns a JWT
        token if successful
      parameters:
      - description: User login object
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/models.LoginUser'
      produces:
      - application/json
      responses:
        "200":
          description: JWT Token
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Authenticate a user
      tags:
      - user
  /register:
    post:
      consumes:
      - application/json
      description: Registers a new user with the given username and password
      parameters:
      - description: User registration object
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/models.LoginUser'
      produces:
      - application/json
      responses:
        "201":
          description: Successfully registered
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Register a new user
      tags:
      - user
  /schools:
    get:
      description: Get all schools (super admin only)
      parameters:
      - default: 0
        description: Offset for pagination
        in: query
        name: offset
        type: integer
      - default: 10
        description: Limit for pagination
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.School'
            type: array
      security:
      - ApiKeyAuth: []
      - JwtAuth: []
      summary: Get all schools
      tags:
      - schools
    post:
      consumes:
      - application/json
      description: Create a new school (super admin only)
      parameters:
      - description: School object
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.School'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.School'
      security:
      - ApiKeyAuth: []
      - JwtAuth: []
      summary: Create school
      tags:
      - schools
  /schools/{id}:
    delete:
      description: Delete school by id (super admin only)
      parameters:
      - description: School ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: Successfully deleted school
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      - JwtAuth: []
      summary: Delete school
      tags:
      - schools
    put:
      consumes:
      - application/json
      description: Update school by id (super admin only)
      parameters:
      - description: School ID
        in: path
        name: id
        required: true
        type: integer
      - description: School object
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.School'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.School'
      security:
      - ApiKeyAuth: []
      - JwtAuth: []
      summary: Update school
      tags:
      - schools
  /students:
    get:
      description: Get a list of all students with optional pagination
      parameters:
      - default: 0
        description: Offset for pagination
        in: query
        name: offset
        type: integer
      - default: 10
        description: Limit for pagination
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved list of students
          schema:
            items:
              $ref: '#/definitions/models.Student'
            type: array
      security:
      - ApiKeyAuth: []
      summary: Get all students with pagination
      tags:
      - students
    post:
      consumes:
      - application/json
      description: Create a new student with kindergarten type (junior/senior)
      parameters:
      - description: Create student object
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.CreateStudent'
      produces:
      - application/json
      responses:
        "201":
          description: Successfully created student
          schema:
            $ref: '#/definitions/models.Student'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      - JwtAuth: []
      summary: Create a new student
      tags:
      - students
  /students/{id}:
    delete:
      description: Delete student by ID
      parameters:
      - description: Student ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: Successfully deleted student
          schema:
            type: string
        "404":
          description: Student not found
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Delete a student by ID
      tags:
      - students
    get:
      description: Get details of a student by ID
      parameters:
      - description: Student ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Successfully retrieved student
          schema:
            $ref: '#/definitions/models.Student'
        "404":
          description: Student not found
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Find a student by ID
      tags:
      - students
    put:
      consumes:
      - application/json
      description: Update student details and kindergarten type (junior/senior)
      parameters:
      - description: Student ID
        in: path
        name: id
        required: true
        type: string
      - description: Update student object
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.UpdateStudent'
      produces:
      - application/json
      responses:
        "200":
          description: Successfully updated student
          schema:
            $ref: '#/definitions/models.Student'
        "400":
          description: Bad Request
          schema:
            type: string
        "404":
          description: Student not found
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Update a student by ID
      tags:
      - students
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: X-API-Key
    type: apiKey
  JwtAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
