swagger: '2.0'
info:
  title: E-Raport API
  version: '1.0'
  description: API documentation for internal school e-raport service.
host: localhost:8001
basePath: /api/v1
schemes:
  - http
consumes:
  - application/json
produces:
  - application/json
paths:
  /:
    get:
      tags: [example]
      summary: Healthcheck
      responses:
        '200':
          description: OK
          schema: { type: string }

  /login:
    post:
      tags: [user]
      security: [{ ApiKeyAuth: [] }]
      summary: Login
      parameters:
        - in: body
          name: user
          required: true
          schema: { $ref: '#/definitions/models.LoginUser' }
      responses:
        '200':
          description: Access token response (refresh token is set in HttpOnly cookie)
          schema: { $ref: '#/definitions/models.AuthTokens' }

  /refresh:
    post:
      tags: [user]
      security: [{ ApiKeyAuth: [] }]
      summary: Refresh access token
      responses:
        '200':
          description: Refreshed access token (refresh token rotated in HttpOnly cookie)
          schema: { $ref: '#/definitions/models.AuthTokens' }

  /logout:
    post:
      tags: [user]
      security: [{ ApiKeyAuth: [] }]
      summary: Logout and clear refresh cookie
      responses:
        '200': { description: Logged out }

  /register:
    post:
      tags: [user]
      security: [{ ApiKeyAuth: [] }]
      summary: Register
      parameters:
        - in: body
          name: user
          required: true
          schema: { $ref: '#/definitions/models.RegisterUser' }
      responses:
        '201': { description: Created }

  /books:
    get:
      tags: [books]
      security: [{ ApiKeyAuth: [] }]
      summary: List books
      parameters:
        - in: query
          name: offset
          type: integer
        - in: query
          name: limit
          type: integer
      responses:
        '200':
          description: OK
          schema:
            type: array
            items: { $ref: '#/definitions/models.Book' }
    post:
      tags: [books]
      security: [{ ApiKeyAuth: [] }, { JwtAuth: [] }]
      summary: Create book
      parameters:
        - in: body
          name: input
          required: true
          schema: { $ref: '#/definitions/models.CreateBook' }
      responses:
        '201': { description: Created }

  /books/{id}:
    get:
      tags: [books]
      security: [{ ApiKeyAuth: [] }]
      summary: Get book by id
      parameters:
        - in: path
          name: id
          required: true
          type: string
      responses:
        '200': { description: OK }
    put:
      tags: [books]
      security: [{ ApiKeyAuth: [] }]
      summary: Update book
      parameters:
        - in: path
          name: id
          required: true
          type: string
        - in: body
          name: input
          required: true
          schema: { $ref: '#/definitions/models.UpdateBook' }
      responses:
        '200': { description: OK }
    delete:
      tags: [books]
      security: [{ ApiKeyAuth: [] }]
      summary: Delete book
      parameters:
        - in: path
          name: id
          required: true
          type: string
      responses:
        '204': { description: No Content }

  /students:
    get:
      tags: [students]
      security: [{ ApiKeyAuth: [] }]
      summary: List students
      responses:
        '200':
          description: OK
          schema:
            type: array
            items: { $ref: '#/definitions/models.Student' }
    post:
      tags: [students]
      security: [{ ApiKeyAuth: [] }, { JwtAuth: [] }]
      summary: Create student
      parameters:
        - in: body
          name: input
          required: true
          schema: { $ref: '#/definitions/models.CreateStudent' }
      responses:
        '201': { description: Created }

  /students/{id}:
    get:
      tags: [students]
      security: [{ ApiKeyAuth: [] }]
      summary: Get student by id
      parameters:
        - in: path
          name: id
          required: true
          type: string
      responses:
        '200': { description: OK }
    put:
      tags: [students]
      security: [{ ApiKeyAuth: [] }]
      summary: Update student
      parameters:
        - in: path
          name: id
          required: true
          type: string
        - in: body
          name: input
          required: true
          schema: { $ref: '#/definitions/models.UpdateStudent' }
      responses:
        '200': { description: OK }
    delete:
      tags: [students]
      security: [{ ApiKeyAuth: [] }]
      summary: Delete student
      parameters:
        - in: path
          name: id
          required: true
          type: string
      responses:
        '204': { description: No Content }

  /classes:
    get:
      tags: [classes]
      security: [{ ApiKeyAuth: [] }]
      summary: List classes
      responses: { '200': { description: OK } }
    post:
      tags: [classes]
      security: [{ ApiKeyAuth: [] }, { JwtAuth: [] }]
      summary: Create class
      parameters:
        - in: body
          name: input
          required: true
          schema: { $ref: '#/definitions/models.CreateClass' }
      responses: { '201': { description: Created } }

  /classes/{id}:
    put:
      tags: [classes]
      security: [{ ApiKeyAuth: [] }]
      summary: Update class
      parameters:
        - in: path
          name: id
          required: true
          type: string
        - in: body
          name: input
          required: true
          schema: { $ref: '#/definitions/models.UpdateClass' }
      responses: { '200': { description: OK } }
    delete:
      tags: [classes]
      security: [{ ApiKeyAuth: [] }]
      summary: Delete class
      parameters:
        - in: path
          name: id
          required: true
          type: string
      responses: { '204': { description: No Content } }

  /grades:
    get:
      tags: [grades]
      security: [{ ApiKeyAuth: [] }]
      summary: List grades
      parameters:
        - in: query
          name: student_id
          type: integer
        - in: query
          name: semester
          type: integer
        - in: query
          name: academic_year
          type: string
      responses: { '200': { description: OK } }
    post:
      tags: [grades]
      security: [{ ApiKeyAuth: [] }, { JwtAuth: [] }]
      summary: Create grade
      parameters:
        - in: body
          name: input
          required: true
          schema: { $ref: '#/definitions/models.CreateGrade' }
      responses: { '201': { description: Created } }

  /grades/{id}:
    put:
      tags: [grades]
      security: [{ ApiKeyAuth: [] }]
      summary: Update grade
      parameters:
        - in: path
          name: id
          required: true
          type: string
        - in: body
          name: input
          required: true
          schema: { $ref: '#/definitions/models.UpdateGrade' }
      responses: { '200': { description: OK } }
    delete:
      tags: [grades]
      security: [{ ApiKeyAuth: [] }]
      summary: Delete grade
      parameters:
        - in: path
          name: id
          required: true
          type: string
      responses: { '204': { description: No Content } }

  /attendances:
    get:
      tags: [attendances]
      security: [{ ApiKeyAuth: [] }]
      summary: List attendances
      parameters:
        - in: query
          name: student_id
          type: integer
        - in: query
          name: semester
          type: integer
        - in: query
          name: academic_year
          type: string
      responses: { '200': { description: OK } }
    put:
      tags: [attendances]
      security: [{ ApiKeyAuth: [] }, { JwtAuth: [] }]
      summary: Upsert attendance
      parameters:
        - in: body
          name: input
          required: true
          schema: { $ref: '#/definitions/models.UpsertAttendance' }
      responses: { '200': { description: OK } }

  /report-notes:
    get:
      tags: [report-notes]
      security: [{ ApiKeyAuth: [] }]
      summary: List report notes
      parameters:
        - in: query
          name: student_id
          type: integer
        - in: query
          name: semester
          type: integer
        - in: query
          name: academic_year
          type: string
      responses: { '200': { description: OK } }

  /enrollments:
    get:
      tags: [enrollments]
      security: [{ ApiKeyAuth: [] }, { JwtAuth: [] }]
      summary: List student enrollments
      parameters:
        - in: query
          name: offset
          type: integer
        - in: query
          name: limit
          type: integer
        - in: query
          name: student_id
          type: integer
        - in: query
          name: academic_year
          type: string
        - in: query
          name: semester
          type: integer
        - in: query
          name: is_active
          type: boolean
      responses: { '200': { description: OK } }
    post:
      tags: [enrollments]
      security: [{ ApiKeyAuth: [] }, { JwtAuth: [] }]
      summary: Create student enrollment
      parameters:
        - in: body
          name: input
          required: true
          schema: { $ref: '#/definitions/models.CreateEnrollment' }
      responses: { '201': { description: Created } }

  /enrollments/{id}/close:
    put:
      tags: [enrollments]
      security: [{ ApiKeyAuth: [] }, { JwtAuth: [] }]
      summary: Close active enrollment
      parameters:
        - in: path
          name: id
          required: true
          type: integer
      responses: { '200': { description: OK } }
    put:
      tags: [report-notes]
      security: [{ ApiKeyAuth: [] }, { JwtAuth: [] }]
      summary: Upsert report note
      parameters:
        - in: body
          name: input
          required: true
          schema: { $ref: '#/definitions/models.UpsertReportNote' }
      responses: { '200': { description: OK } }

  /schools:
    get:
      tags: [schools]
      security: [{ ApiKeyAuth: [] }, { JwtAuth: [] }]
      summary: List schools (super admin only)
      parameters:
        - in: query
          name: offset
          type: integer
        - in: query
          name: limit
          type: integer
      responses:
        '200':
          description: OK
          schema:
            type: object
            properties:
              data:
                type: array
                items: { $ref: '#/definitions/models.School' }
    post:
      tags: [schools]
      security: [{ ApiKeyAuth: [] }, { JwtAuth: [] }]
      summary: Create school (super admin only)
      parameters:
        - in: body
          name: input
          required: true
          schema: { $ref: '#/definitions/models.CreateSchool' }
      responses:
        '201':
          description: Created
          schema:
            type: object
            properties:
              data: { $ref: '#/definitions/models.School' }

  /schools/{id}:
    put:
      tags: [schools]
      security: [{ ApiKeyAuth: [] }, { JwtAuth: [] }]
      summary: Update school (super admin only)
      parameters:
        - in: path
          name: id
          required: true
          type: string
        - in: body
          name: input
          required: true
          schema: { $ref: '#/definitions/models.UpdateSchool' }
      responses:
        '200':
          description: OK
          schema:
            type: object
            properties:
              data: { $ref: '#/definitions/models.School' }
    delete:
      tags: [schools]
      security: [{ ApiKeyAuth: [] }, { JwtAuth: [] }]
      summary: Delete school (super admin only)
      parameters:
        - in: path
          name: id
          required: true
          type: string
      responses: { '204': { description: No Content } }

  /schools/profile:
    get:
      tags: [schools]
      security: [{ ApiKeyAuth: [] }]
      summary: Get school profile
      responses:
        '200':
          description: OK
          schema:
            type: object
            properties:
              data: { $ref: '#/definitions/models.UpsertSchoolProfile' }
    put:
      tags: [schools]
      security: [{ ApiKeyAuth: [] }, { JwtAuth: [] }]
      summary: Upsert school profile
      parameters:
        - in: body
          name: input
          required: true
          schema: { $ref: '#/definitions/models.UpsertSchoolProfile' }
      responses:
        '200':
          description: OK
          schema:
            type: object
            properties:
              data: { $ref: '#/definitions/models.School' }

  /dashboard/summary:
    get:
      tags: [dashboard]
      security: [{ ApiKeyAuth: [] }, { JwtAuth: [] }]
      summary: Get executive dashboard summary
      responses:
        '200':
          description: OK
          schema:
            type: object
            properties:
              data: { $ref: '#/definitions/models.DashboardSummary' }

  /reports/students/{student_id}/print:
    get:
      tags: [reports]
      security: [{ ApiKeyAuth: [] }]
      summary: Printable HTML report card
      produces: [text/html]
      parameters:
        - in: path
          name: student_id
          required: true
          type: integer
        - in: query
          name: semester
          required: true
          type: integer
        - in: query
          name: academic_year
          required: true
          type: string
      responses: { '200': { description: OK } }

  /reports/students/{student_id}/pdf:
    get:
      tags: [reports]
      security: [{ ApiKeyAuth: [] }]
      summary: Export student report PDF
      produces: [application/pdf]
      parameters:
        - in: path
          name: student_id
          required: true
          type: integer
        - in: query
          name: semester
          required: true
          type: integer
        - in: query
          name: academic_year
          required: true
          type: string
      responses: { '200': { description: OK } }

  /reports/classes/{class_id}/pdf:
    get:
      tags: [reports]
      security: [{ ApiKeyAuth: [] }]
      summary: Export class report PDF (batch)
      produces: [application/pdf]
      parameters:
        - in: path
          name: class_id
          required: true
          type: integer
        - in: query
          name: semester
          required: true
          type: integer
        - in: query
          name: academic_year
          required: true
          type: string
      responses: { '200': { description: OK } }

  /reports/students/{student_id}/finalize:
    post:
      tags: [reports]
      security: [{ ApiKeyAuth: [] }, { JwtAuth: [] }]
      summary: Finalize report card
      parameters:
        - in: path
          name: student_id
          required: true
          type: integer
        - in: query
          name: semester
          required: true
          type: integer
        - in: query
          name: academic_year
          required: true
          type: string
      responses: { '200': { description: OK } }

definitions:
  models.LoginUser:
    type: object
    required: [username, password]
    properties:
      username: { type: string }
      password: { type: string }

  models.RegisterUser:
    type: object
    required: [username, password]
    properties:
      username: { type: string }
      password: { type: string }
      role:
        type: string
        enum: [admin, guru, wali_kelas]

  models.AuthTokens:
    type: object
    properties:
      token: { type: string }
      access_token: { type: string }

  models.RefreshTokenRequest:
    type: object
    required: [refresh_token]
    properties:
      refresh_token: { type: string }

  models.Book:
    type: object
    properties:
      id: { type: integer }
      title: { type: string }
      author: { type: string }
      student_id: { type: integer }

  models.CreateBook:
    type: object
    required: [title, author]
    properties:
      title: { type: string }
      author: { type: string }
      school_id:
        type: integer
        description: Required for super_admin write requests. Must be omitted for non-super_admin.
      student_id: { type: integer }

  models.UpdateBook:
    type: object
    properties:
      title: { type: string }
      author: { type: string }
      school_id:
        type: integer
        description: Required for super_admin write requests. Must be omitted for non-super_admin.
      student_id: { type: integer }

  models.Student:
    type: object
    properties:
      id: { type: integer }
      name: { type: string }
      email: { type: string }
      type: { type: string, enum: [junior, senior] }
      class_id: { type: integer }

  models.CreateStudent:
    type: object
    required: [name, email, type]
    properties:
      name: { type: string }
      email: { type: string }
      type: { type: string, enum: [junior, senior] }
      school_id:
        type: integer
        description: Required for super_admin write requests. Must be omitted for non-super_admin.
      class_id: { type: integer }

  models.UpdateStudent:
    type: object
    properties:
      name: { type: string }
      email: { type: string }
      type: { type: string, enum: [junior, senior] }
      school_id:
        type: integer
        description: Required for super_admin write requests. Must be omitted for non-super_admin.
      class_id: { type: integer }

  models.StudentEnrollment:
    type: object
    properties:
      id: { type: integer }
      school_id: { type: integer }
      student_id: { type: integer }
      class_id: { type: integer }
      academic_year: { type: string }
      semester: { type: integer }
      is_active: { type: boolean }
      start_date: { type: string, format: date-time }
      end_date: { type: string, format: date-time }

  models.CreateEnrollment:
    type: object
    required: [student_id, class_id, academic_year, semester]
    properties:
      school_id:
        type: integer
        description: Required for super_admin write requests. Must be omitted for non-super_admin.
      student_id: { type: integer }
      class_id: { type: integer }
      academic_year: { type: string }
      semester: { type: integer }
      start_date: { type: string, format: date-time }

  models.CreateClass:
    type: object
    required: [name, level, academic_year]
    properties:
      name: { type: string }
      level: { type: string }
      homeroom: { type: string }
      academic_year: { type: string }
      school_id:
        type: integer
        description: Required for super_admin write requests. Must be omitted for non-super_admin.

  models.UpdateClass:
    type: object
    properties:
      name: { type: string }
      level: { type: string }
      homeroom: { type: string }
      academic_year: { type: string }
      school_id:
        type: integer
        description: Required for super_admin write requests. Must be omitted for non-super_admin.

  models.CreateGrade:
    type: object
    required: [student_id, book_id, semester, academic_year, knowledge_score, skill_score]
    properties:
      school_id:
        type: integer
        description: Required for super_admin write requests. Must be omitted for non-super_admin.
      enrollment_id: { type: integer }
      student_id: { type: integer }
      book_id: { type: integer }
      semester: { type: integer }
      academic_year: { type: string }
      knowledge_score: { type: number }
      skill_score: { type: number }
      notes: { type: string }

  models.UpdateGrade:
    type: object
    properties:
      school_id:
        type: integer
        description: Required for super_admin write requests. Must be omitted for non-super_admin.
      enrollment_id: { type: integer }
      knowledge_score: { type: number }
      skill_score: { type: number }
      notes: { type: string }

  models.UpsertAttendance:
    type: object
    required: [student_id, semester, academic_year]
    properties:
      school_id:
        type: integer
        description: Required for super_admin write requests. Must be omitted for non-super_admin.
      enrollment_id: { type: integer }
      student_id: { type: integer }
      semester: { type: integer }
      academic_year: { type: string }
      sick_days: { type: integer }
      permission_days: { type: integer }
      absent_days: { type: integer }

  models.UpsertReportNote:
    type: object
    required: [student_id, semester, academic_year, homeroom_comment]
    properties:
      school_id:
        type: integer
        description: Required for super_admin write requests. Must be omitted for non-super_admin.
      enrollment_id: { type: integer }
      student_id: { type: integer }
      semester: { type: integer }
      academic_year: { type: string }
      homeroom_comment: { type: string }

  models.UpsertSchoolProfile:
    type: object
    required: [school_name]
    properties:
      school_id:
        type: integer
        description: Required for super_admin write requests. Must be omitted for non-super_admin.
      school_name: { type: string }
      npsn: { type: string }
      address: { type: string }
      principal_name: { type: string }
      principal_nip: { type: string }
      headmaster_sign: { type: string }
      school_stamp: { type: string }

  models.DashboardTotals:
    type: object
    properties:
      students: { type: integer }
      classes: { type: integer }
      grades: { type: integer }
      attendances: { type: integer }
      report_notes: { type: integer }

  models.SemesterTrendItem:
    type: object
    properties:
      academic_year: { type: string }
      semester: { type: integer }
      avg_final: { type: number }
      count: { type: integer }

  models.ClassCompletenessItem:
    type: object
    properties:
      class_id: { type: integer }
      class_name: { type: string }
      level: { type: string }
      total_students: { type: integer }
      grade_pct: { type: integer }
      attendance_pct: { type: integer }
      report_note_pct: { type: integer }
      completeness_pct: { type: integer }

  models.DashboardSummary:
    type: object
    properties:
      totals: { $ref: '#/definitions/models.DashboardTotals' }
      semester_trends:
        type: array
        items: { $ref: '#/definitions/models.SemesterTrendItem' }
      class_completeness:
        type: array
        items: { $ref: '#/definitions/models.ClassCompletenessItem' }
      recommendations:
        type: array
        items: { type: string }

  models.School:
    type: object
    properties:
      id: { type: integer }
      name: { type: string }
      code: { type: string }
      address: { type: string }
      npsn: { type: string }
      principal_name: { type: string }
      principal_nip: { type: string }
      headmaster_sign: { type: string }
      school_stamp: { type: string }

  models.CreateSchool:
    type: object
    required: [name]
    properties:
      name: { type: string }
      code: { type: string }
      address: { type: string }
      npsn: { type: string }
      principal_name: { type: string }
      principal_nip: { type: string }
      headmaster_sign: { type: string }
      school_stamp: { type: string }

  models.UpdateSchool:
    type: object
    properties:
      name: { type: string }
      code: { type: string }
      address: { type: string }
      npsn: { type: string }
      principal_name: { type: string }
      principal_nip: { type: string }
      headmaster_sign: { type: string }
      school_stamp: { type: string }

securityDefinitions:
  ApiKeyAuth:
    type: apiKey
    name: X-API-Key
    in: header
  JwtAuth:
    type: apiKey
    name: Authorization
    in: header
